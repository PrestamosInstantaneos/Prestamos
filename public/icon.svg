<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .background { fill: #0b0e14; }
    .cunaguaro-base { fill: #f8fafc; }
    .cunaguaro-stripes { fill: #0b0e14; opacity: 0.35; }
    .cunaguaro-eyes { fill: #f46453; } /* Coral primary color */
  </style>
  <rect width="180" height="180" rx="37" class="background" />
  <g transform="translate(40, 40)">
    <!-- Ears -->
    <polygon points="15,45 25,15 42,35" class="cunaguaro-base" />
    <polygon points="85,45 75,15 58,35" class="cunaguaro-base" />
    
    <!-- Main head/snout -->
    <polygon points="42,35 50,28 58,35 70,55 50,85 30,55" class="cunaguaro-base" />
    
    <!-- Forehead markings -->
    <polygon points="48,30 52,30 50,45" class="cunaguaro-stripes" />
    <polygon points="38,36 41,36 39,45" class="cunaguaro-stripes" />
    <polygon points="62,36 59,36 61,45" class="cunaguaro-stripes" />
    
    <!-- Glowing eyes -->
    <polygon points="37,48 45,46 41,52" class="cunaguaro-eyes" />
    <polygon points="63,48 55,46 59,52" class="cunaguaro-eyes" />
    
    <!-- Nose -->
    <polygon points="46,65 54,65 50,71" fill="#0b0e14" />
    
    <!-- Whisker details -->
    <circle cx="38" cy="62" r="1.5" fill="#0b0e14" />
    <circle cx="34" cy="64" r="1.5" fill="#0b0e14" />
    <circle cx="62" cy="62" r="1.5" fill="#0b0e14" />
    <circle cx="66" cy="64" r="1.5" fill="#0b0e14" />
  </g>
</svg>